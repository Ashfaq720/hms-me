services:
  #PHP Service
  hms:
    build:
      args:
        user: hms_app
        uid: 1000
      context: .
      dockerfile: .docker/Dockerfile
    image: hms
    restart: unless-stopped
    working_dir: /var/www/
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    volumes:
      - ./:/var/www
      - ./.docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - hms_network

  #MySQL Service
  hms_db:
    image: mysql:8.0
    container_name: hms_db
    restart: unless-stopped
    ports:
      - "${DOCKER_DB_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - hms_mysql_data:/var/lib/mysql
    networks:
      - hms_network

  #Nginx Service
  hms_nginx:
    image: nginx:alpine
    container_name: hms_nginx
    restart: unless-stopped
    tty: true
    ports:
      - "${DOCKER_APP_PORT}:80"
      - "${DOCKER_APP_SSL_PORT}:443"
    volumes:
      - ./:/var/www
      - ./.docker/nginx/conf.d/:/etc/nginx/conf.d/
      - ./.docker/nginx/certs:/etc/nginx/certs
    networks:
      - hms_network
  # phpmyadmin service
  hms_phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    container_name: hms_phpmyadmin
    depends_on:
      - hms_db
    ports:
      - "${DOCKER_PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: hms_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      UPLOAD_LIMIT: 300M
    networks:
      - hms_network

  hms_redis_cache:
    image: redis:alpine
    restart: always
    container_name: hms_redis_cache
    ports:
      - '${DOCKER_REDIS_PORT}:6379'
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - hms_cache:/data
    networks:
      - hms_network

#Docker Networks
networks:
  hms_network:
    driver: bridge

#Volumes
volumes:
  hms_mysql_data:
  hms_cache:
  hms_logs:
    driver: local
    driver_opts:
      type: none
      device: ./logs
